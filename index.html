<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>부서 활동자료 만들기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size: 17px; }
  body {
    font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
    background:#eef1f6; color:#1c2333; padding-bottom:120px;
  }
  header {
    background:#1662B6; color:#fff; padding:20px 18px 18px;
    border-radius:0 0 20px 20px;
  }
  header h1 { font-size:1.35rem; font-weight:800; }
  header p { font-size:0.95rem; opacity:.92; margin-top:6px; line-height:1.45; }
  .wrap { padding:16px 14px; max-width:560px; margin:0 auto; }
  .card {
    background:#fff; border-radius:16px; padding:18px 16px; margin-bottom:16px;
    box-shadow:0 2px 8px rgba(20,40,80,.07);
  }
  .step {
    display:inline-flex; align-items:center; justify-content:center;
    background:#1662B6; color:#fff; font-weight:800; font-size:.95rem;
    border-radius:999px; padding:4px 12px; margin-bottom:10px;
  }
  label.big { display:block; font-size:1.05rem; font-weight:700; margin-bottom:8px; }
  input[type=text] {
    width:100%; font-size:1.15rem; padding:14px 12px; border:2px solid #c9d3e4;
    border-radius:12px; background:#fafbfe; color:#1c2333;
  }
  input[type=text]:focus { outline:none; border-color:#1662B6; background:#fff; }
  .rows { margin-top:10px; }
  .row { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  .row input { flex:1; }
  .del {
    flex:none; width:48px; height:48px; border:none; border-radius:12px;
    background:#ffe9e9; color:#d33; font-size:1.3rem; font-weight:800;
  }
  .del:active { background:#ffd2d2; }
  .add {
    width:100%; padding:14px; font-size:1.05rem; font-weight:800;
    border:2px dashed #1662B6; color:#1662B6; background:#f2f7ff;
    border-radius:12px; margin-top:2px;
  }
  .add:active { background:#e2eeff; }
  .hint { font-size:.88rem; color:#67718a; margin-top:8px; line-height:1.5; }

  /* 미리보기 */
  .pv { border:1px solid #d8dfec; border-radius:12px; overflow:hidden; background:#fff; }
  .pv-top { display:flex; align-items:center; justify-content:space-between; padding:8px 10px 4px; }
  .pv-tag { color:#1662B6; font-weight:800; font-size:.72rem; }
  .pv-bar { height:5px; background:#1662B6; margin:2px 10px 8px; }
  .pv-title { text-align:center; margin:0 auto 10px; width:fit-content; max-width:80%; background:#8f9bf0; border-radius:999px; padding:5px 26px; font-weight:800; font-size:1.05rem; color:#404040; }
  .pv-body { padding:0 14px 14px; }
  .pv-h { color:#e00000; font-weight:800; font-size:.85rem; margin:8px 0 4px; }
  .pv-b { font-size:.82rem; font-weight:600; color:#111; padding-left:14px; line-height:1.55; }

  /* 하단 고정 버튼 */
  .bottom {
    position:fixed; left:0; right:0; bottom:0; display:flex; gap:10px;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.96); border-top:1px solid #dde3ee;
    max-width:560px; margin:0 auto;
  }
  .btn {
    flex:1; border:none; border-radius:14px; padding:17px 6px;
    font-size:1.12rem; font-weight:800; color:#fff;
  }
  .btn-save { background:#1662B6; }
  .btn-save:active { background:#0f4c92; }
  .btn-share { background:#12a150; }
  .btn-share:active { background:#0d8140; }
  .btn:disabled { opacity:.5; }

  /* 토스트 */
  #toast {
    position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
    background:#1c2333; color:#fff; padding:13px 20px; border-radius:12px;
    font-size:1rem; font-weight:700; display:none; z-index:99; max-width:88%;
    text-align:center; line-height:1.5;
  }
</style>
</head>
<body>

<header>
  <h1>📋 부서 활동자료 만들기</h1>
  <p>내용을 적고 아래 <b>저장</b> 또는 <b>공유</b> 버튼만 누르면<br>발표용 PPT 파일이 완성됩니다.</p>
</header>

<div id="envBanner" style="display:none; background:#fff4d6; border:2px solid #f0b000; color:#7a5600; border-radius:14px; padding:14px; margin:14px 14px 0; max-width:532px; font-size:1rem; font-weight:700; line-height:1.6;">
⚠️ 지금은 <b>미리보기 화면</b>이라 저장·공유가 막혀 있어요.<br>
① 이 파일을 <b>휴대폰에 저장</b>한 뒤<br>
② <b>내 파일 → 다운로드</b>에서 파일을 눌러<br>
③ <b>인터넷(삼성인터넷/크롬)으로 열기</b>를 선택하면<br>
저장·공유 버튼이 정상 작동합니다 👍
</div>
<div class="wrap">

  <div class="card">
    <span class="step">① 부서 이름</span>
    <input type="text" id="deptName" value="시설관리부" placeholder="예) 시설관리부">
  </div>

  <div class="card">
    <span class="step">② 첫째 칸</span>
    <label class="big">칸 제목</label>
    <input type="text" id="h1" value="1,2월 활동사항" placeholder="예) 1,2월 활동사항">
    <label class="big" style="margin-top:14px;">내용 (한 줄씩)</label>
    <div class="rows" id="rows1"></div>
    <button class="add" onclick="addRow(1)">＋ 한 줄 추가</button>
  </div>

  <div class="card">
    <span class="step">③ 둘째 칸</span>
    <label class="big">칸 제목</label>
    <input type="text" id="h2" value="3월 계획사항" placeholder="예) 3월 계획사항">
    <label class="big" style="margin-top:14px;">내용 (한 줄씩)</label>
    <div class="rows" id="rows2"></div>
    <button class="add" onclick="addRow(2)">＋ 한 줄 추가</button>
    <p class="hint">💡 전체 내용이 많으면 글자 크기가 자동으로 조금 작아져서 한 장에 들어갑니다.</p>
  </div>

// ---------- 입력 줄 관리 ----------
const defaults1 = ["대강당 강대상 조명보수 공사","대강당 암막 커튼 레일 교체","2,3 주차장 주차라인 페인트 작업"];
const defaults2 = ["교회당 주변 조경 전지작업 (3월 7일 토요일)","카페 주방 천정 누수","카페 데크 폴딩 도어 누수"];

function makeRowEl(sec, val){
  const div = document.createElement('div');
  div.className = 'row';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.value = val || ''; inp.placeholder = '내용을 적어주세요';
  inp.addEventListener('input', () => { preview(); scheduleBuild(); });
  const del = document.createElement('button');
  del.className = 'del'; del.textContent = '✕'; del.title = '이 줄 지우기';
  del.onclick = () => {
    const box = document.getElementById('rows'+sec);
    if (box.children.length <= 1) { toast('마지막 한 줄은 지울 수 없어요'); return; }
    div.remove(); preview(); scheduleBuild();
  };
  div.appendChild(inp); div.appendChild(del);
  return div;
}
function addRow(sec, val){
  const box = document.getElementById('rows'+sec);
  if (box.children.length >= 8) { toast('한 칸에 최대 8줄까지 가능해요'); return; }
  const el = makeRowEl(sec, val);
  box.appendChild(el);
  if (val === undefined) el.querySelector('input').focus();
  preview(); scheduleBuild();
}
function getRows(sec){
  return [...document.querySelectorAll('#rows'+sec+' input')]
    .map(i => i.value.trim()).filter(v => v);
}

// ---------- 미리보기 ----------
function preview(){
  document.getElementById('pvTitle').textContent = document.getElementById('deptName').value || '부서 이름';
  const body = document.getElementById('pvBody');
  body.innerHTML = '';
  [[document.getElementById('h1').value, getRows(1)],
   [document.getElementById('h2').value, getRows(2)]].forEach(([h, rows]) => {
    const hd = document.createElement('div'); hd.className='pv-h'; hd.textContent = '■ ' + (h||'제목');
    body.appendChild(hd);
    rows.forEach(r => {
      const b = document.createElement('div'); b.className='pv-b'; b.textContent = '- ' + r;
      body.appendChild(b);
    });
  });
}


// ---------- 미리 만들어두기 (공유창이 바로 뜨게) ----------
let zipReady = null, cachedBlob = null, cachedName = '', buildTimer = null;
function currentData(){
  return {
    title: document.getElementById('deptName').value.trim(),
    h1: document.getElementById('h1').value.trim(),
    h2: document.getElementById('h2').value.trim(),
    b1: getRows(1), b2: getRows(2)
  };
}
function dataOk(d){ return d.title && d.h1 && d.h2 && d.b1.length && d.b2.length; }
async function rebuild(){
  const d = currentData();
  if (!dataOk(d)) { cachedBlob = null; return; }
  try {
    if (!zipReady) zipReady = await JSZip.loadAsync(TEMPLATE_B64, { base64: true });
    zipReady.file('ppt/slides/slide1.xml', buildSlideXml(d.title, d.h1, d.b1, d.h2, d.b2));
    cachedBlob = await zipReady.generateAsync({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation'
    });
    cachedName = d.title + '_활동자료.pptx';
  } catch(e) { cachedBlob = null; console.error(e); }
}
function scheduleBuild(){
  clearTimeout(buildTimer);
  buildTimer = setTimeout(rebuild, 400);
}

// ---------- PPT 생성 ----------
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function titlePara(t){
  return '<a:p><a:pPr algn="ctr"/><a:r><a:rPr lang="ko-KR" altLang="en-US" sz="3200" b="1" dirty="0">'
    +'<a:solidFill><a:schemeClr val="tx1"><a:lumMod val="75000"/><a:lumOff val="25000"/></a:schemeClr></a:solidFill>'
    +'<a:latin typeface="ELAND 나이스 Medium" panose="02020603020101020101" pitchFamily="18" charset="-127"/>'
    +'<a:ea typeface="ELAND 나이스 Medium" panose="02020603020101020101" pitchFamily="18" charset="-127"/></a:rPr>'
    +'<a:t>'+esc(t)+'</a:t></a:r></a:p>';
}
function headerPara(t){
  return '<a:p><a:r><a:rPr lang="ko-KR" altLang="en-US" sz="2000" b="1" dirty="0">'
    +'<a:solidFill><a:srgbClr val="FF0000"/></a:solidFill><a:latin typeface="+mn-ea"/><a:ea typeface="+mn-ea"/></a:rPr>'
    +'<a:t>\u25A0 '+esc(t)+'</a:t></a:r></a:p>';
}
function bulletPara(t, sz){
  return '<a:p><a:pPr marL="742950" lvl="1" indent="-285750"><a:lnSpc><a:spcPct val="150000"/></a:lnSpc>'
    +'<a:buFontTx/><a:buChar char="-"/></a:pPr><a:r><a:rPr lang="ko-KR" altLang="en-US" sz="'+sz+'" b="1" dirty="0"/>'
    +'<a:t>'+esc(t)+'</a:t></a:r></a:p>';
}
function buildSlideXml(title, h1, b1, h2, b2){
  const total = b1.length + b2.length;
  const sz = total <= 7 ? 2400 : (total <= 9 ? 2000 : 1800);
  const s1 = headerPara(h1) + b1.map(b => bulletPara(b, sz)).join('');
  const s2 = headerPara(h2) + b2.map(b => bulletPara(b, sz)).join('');
  const per = sz === 2400 ? 34 : (sz === 2000 ? 41 : 46);
  const lines = b1.reduce((n, b) => n + Math.max(1, Math.ceil(b.length / per)), 0);
  const lh = Math.round(sz / 100 * 12700 * 1.2 * 1.5);
  const hh = Math.round(20 * 12700 * 1.35);
  const height = 91440 * 2 + hh + lines * lh;
  const s2y = 1204232 + Math.max(height, 900000) + 250000;
  return SLIDE_TMPL.replace('{{TITLE}}', titlePara(title))
                   .replace('{{S1}}', s1).replace('{{S2}}', s2)
                   .replace('{{S2Y}}', String(s2y));
}

async function makeFile(mode){
  const d = currentData();
  if (!d.title) { toast('부서 이름을 적어주세요'); return; }
  if (!d.h1 || !d.h2) { toast('칸 제목을 적어주세요'); return; }
  if (!d.b1.length || !d.b2.length) { toast('내용을 한 줄 이상 적어주세요'); return; }

  // 캐시가 없으면 즉석 생성 (수십 ms 수준)
  if (!cachedBlob) await rebuild();
  if (!cachedBlob) { toast('파일 준비에 실패했어요. 다시 눌러주세요.'); return; }

  const blob = cachedBlob, fname = cachedName;

  if (mode === 'share') {
    const file = new File([blob], fname, { type: blob.type });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: fname });
        toast('공유 완료! 🎉');
      } catch(e) {
        if (e.name !== 'AbortError') {
          download(blob, fname);
          toast('공유창을 못 열어서 파일로 저장했어요.\n[내 파일 → 다운로드]에서 꾹 눌러 공유해 주세요.');
        }
      }
    } else {
      download(blob, fname);
      toast('이 브라우저는 바로 공유가 안 돼요.\n파일로 저장했으니 [내 파일 → 다운로드]에서 꾹 눌러 공유해 주세요.');
    }
  } else {
    download(blob, fname);
    toast('저장 완료! 📂 [내 파일 → 다운로드]에 있어요.');
  }
}

function download(blob, fname){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  // 미리보기 화면 등에서 다운로드가 막힌 경우 새 창 시도
  let inIframe = false;
  try { inIframe = (window.self !== window.top); } catch(e){ inIframe = true; }
  if (inIframe) {
    try { window.open(url, '_blank'); } catch(e){}
    document.getElementById('envBanner').style.display = 'block';
    document.getElementById('envBanner').scrollIntoView({behavior:'smooth'});
    toast('저장이 안 되면 위 노란 안내대로\n브라우저에서 다시 열어주세요');
  }
  setTimeout(() => URL.revokeObjectURL(url), 8000);
}

let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = 'none', 3500);
}


// ---------- 실행 환경 감지 ----------
(function(){
  let blocked = false;
  try {
    if (window.self !== window.top) blocked = true;           // iframe(미리보기) 안
  } catch(e) { blocked = true; }
  try {
    const a = document.createElement('a');
    if (typeof a.download === 'undefined') blocked = true;    // download 미지원
  } catch(e) {}
  if (blocked) document.getElementById('envBanner').style.display = 'block';
})();

// ---------- 초기화 ----------
defaults1.forEach(v => document.getElementById('rows1').appendChild(makeRowEl(1, v)));
defaults2.forEach(v => document.getElementById('rows2').appendChild(makeRowEl(2, v)));
['deptName','h1','h2'].forEach(id => document.getElementById(id).addEventListener('input', () => { preview(); scheduleBuild(); }));
preview();
scheduleBuild();
</script>
